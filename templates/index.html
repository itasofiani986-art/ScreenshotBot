<!DOCTYPE html>
<html>

<head>

<title>
📸 Screenshot Bot Dashboard
</title>


<style>


*{
box-sizing:border-box;
}



body{

margin:0;

padding:40px;

font-family:
"Segoe UI",
Arial,
sans-serif;

background:
linear-gradient(
135deg,
#667eea,
#764ba2
);

min-height:100vh;

}




.container{

max-width:1100px;

margin:auto;

}




.header{


background:white;

padding:25px;

border-radius:20px;

box-shadow:
0 10px 30px rgba(0,0,0,.15);

margin-bottom:25px;

}



.header h1{

margin:0;

color:#333;

}



.header p{

color:#777;

}




.card{


background:white;

padding:25px;

border-radius:20px;

box-shadow:
0 10px 30px rgba(0,0,0,.15);

margin-bottom:25px;

}




label{

font-weight:bold;

display:block;

margin-bottom:8px;

color:#555;

}




select,
input,
textarea{


width:100%;

padding:13px;

border-radius:12px;

border:

1px solid #ddd;

font-size:15px;

margin-bottom:15px;


}




textarea{

height:160px;

resize:none;

}




.mode{


display:flex;

gap:15px;

}




.mode-box{


flex:1;

padding:20px;

background:#f5f5f5;

border-radius:15px;

text-align:center;

cursor:pointer;

transition:.2s;


}



.mode-box:hover{

transform:translateY(-3px);

background:#eee;

}




.mode-box input{

width:auto;

}





button{


width:100%;

padding:15px;

border:none;

border-radius:15px;


background:

linear-gradient(

135deg,

#667eea,

#764ba2

);


color:white;

font-size:16px;

cursor:pointer;


}



button:hover{

opacity:.9;

}




.copy-btn{


background:

linear-gradient(

135deg,

#11998e,

#38ef7d

);

margin-bottom:20px;

}





.hidden{

display:none;

}






.result-grid{


display:grid;


grid-template-columns:

repeat(

auto-fill,

minmax(300px,1fr)

);


gap:15px;


}






.file-card{


background:#f8f8f8;

padding:20px;

border-radius:15px;

box-shadow:

0 5px 15px rgba(0,0,0,.08);


}




.file-name{


font-weight:bold;

font-size:14px;

word-break:break-all;

margin-bottom:15px;


}






.open-btn{


display:block;

padding:12px;

background:#667eea;

color:white;

text-align:center;

border-radius:10px;

text-decoration:none;


}



.open-btn:hover{


background:#5567d8;


}





.empty{


text-align:center;

color:#777;

padding:30px;

}





.badge{


display:inline-block;

background:#eee;

padding:5px 12px;

border-radius:20px;

font-size:12px;

margin-bottom:10px;


}



</style>


</head>





<body>



<div class="container">





<div class="header">


<h1>
📸 Screenshot Bot Dashboard
</h1>


<p>
Auto Screenshot Multi Site System
</p>


</div>










<div class="card">



<form action="/proses" method="POST">






<label>
Pilih Mode
</label>



<div class="mode">





<label class="mode-box">


<input

type="radio"

name="mode"

value="history"

checked

onclick="ubahMode('history')"

>


<br>

📜

<br>

History Coin


</label>








<label class="mode-box">


<input

type="radio"

name="mode"

value="transaksi"

onclick="ubahMode('transaksi')"

>


<br>

💰

<br>

Transaksi Lengkap


</label>






</div>








<br>







<label>

Pilih Situs

</label>



<select name="site">



{% for s in sites %}



<option value="{{s}}">

{{s}}

</option>



{% endfor %}



</select>









<div id="transaksiBox" class="hidden">






<label>

Tanggal Awal

</label>



<input

type="date"

name="start"

>




<label>

Tanggal Akhir

</label>



<input

type="date"

name="end"

>








<label>

Category

</label>



<select name="category">



<option value="">

ALL

</option>


<option value="1">

LIVEGAME

</option>


<option value="3">

SPORT

</option>


<option value="4">

SLOT

</option>


<option value="2">

LOTTERY

</option>


<option value="5">

FISHING

</option>


<option value="6">

ARCADE

</option>



</select>




</div>









<label>

User ID

</label>



<textarea

name="ids"

placeholder="

user001

user002

user003


1 ID 1 baris

"

></textarea>







<label>

🔒 ID / Kata yang tidak ingin muncul di screenshot

</label>



<textarea

name="sensor"

placeholder="

Contoh:

X7096691

E7722134

Password

Email

Nomor Rekening


1 kata 1 baris

"

></textarea>







<button>

🚀 AMBIL SCREENSHOT

</button>







</form>


</div>









<div class="card">



<h2>

📂 Hasil Screenshot Terbaru

</h2>






<button

class="copy-btn"

onclick="copyAll()"

>

📋 COPY ALL LINK

</button>









<div class="result-grid">






{% if files %}






{% for file in files %}






<div class="file-card">






<div class="badge">

{{file.split('/')[1]}}

</div>






<div class="file-name">

{{file}}

</div>







<a

class="open-btn"

target="_blank"

href="{{ url_for('screenshot', filename=file) }}"

>

👁 LIHAT SCREENSHOT

</a>







</div>







{% endfor %}








{% else %}







<div class="empty">


Belum ada screenshot terbaru


</div>







{% endif %}







</div>








</div>







</div>









<script>





function ubahMode(mode){



let box =

document.getElementById(

"transaksiBox"

);





if(mode=="transaksi"){


box.classList.remove(

"hidden"

);


}

else{


box.classList.add(

"hidden"

);


}



}









function copyAll(){



let text="";





document

.querySelectorAll(".open-btn")

.forEach(

function(x){


text += x.href + "\n";


}

);






navigator.clipboard.writeText(text);






alert(

"Semua link berhasil dicopy"

);





}







</script>






</body>


</html>
